<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>MovieFinder | Busca de Filmes</title>
   <link rel="stylesheet" href="style.css">
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>

   <div class="bg-grid"></div>

   <header class="header-fixed">
      <div class="container header-content">

         <div class="logo-wrap">
            <span class="logo-icon"><i class="fas fa-film"></i></span>
            <h1 class="logo">Movie<span class="logo-accent">Finder</span></h1>
         </div>

         <div class="search-area">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" placeholder="Buscar filmes ou séries...">
            <div class="search-line"></div>
         </div>

         <div class="header-controls">
            <div class="tech-switch-container">
               <input type="radio" name="searchType" id="typeMovie" value="movie" checked>
               <label for="typeMovie" class="tech-label">
                  <i class="fas fa-film label-icon"></i>
                  <span>Filmes</span>
               </label>

               <input type="radio" name="searchType" id="typeTv" value="tv">
               <label for="typeTv" class="tech-label">
                  <i class="fas fa-tv label-icon"></i>
                  <span>Séries</span>
               </label>

               <div class="tech-highlight"></div>
            </div>

            <button id="themeToggle" class="theme-toggle" aria-label="Alternar modo">
               <i class="fas fa-moon"></i>
            </button>
         </div>
      </div>
      <div class="header-scanline"></div>
   </header>

   <main class="container movie-list-container">
      <div class="list-title-wrap">
         <span class="title-tag">&lt;</span>
         <h2 id="listTitle">Filmes Populares Atuais</h2>
         <span class="title-tag">/&gt;</span>
      </div>
      <div class="movie-grid" id="movieGrid"></div>
      <p class="message-text" id="statusMessage" style="display: none;"></p>
   </main>

   <div id="movieModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-content">
         <button class="close-button" id="closeModal" aria-label="Fechar">
            <i class="fas fa-times"></i>
         </button>
         <div id="modalBody"></div>
      </div>
   </div>

   <script src="script.js"></script>
</body>
</html>
